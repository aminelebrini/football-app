services:
    backend:
        build: ./backend
        container_name: football-backend
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./backend:/var/www
        ports:
            - "9000:9000"
        env_file:
            - .env
        depends_on:
            - db
    frontend:
        build: ./frontend
        container_name: football-frontend
        restart: unless-stopped
        working_dir: /app
        volumes:
            - ./frontend:/app
            - /app/node_modules
        ports:
            - "5173:5173"
        command: [ "npm", "run", "dev", "--", "--host", "0.0.0.0" ]
        depends_on:
            - backend
    db:
        image: postgres:16
        container_name: football-db
        restart: unless-stopped
        env_file:
            - .env
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - db_data:/var/lib/postgresql/data
    pgadmin:
        image: dpage/pgadmin4
        container_name: pg_football_admin
        restart: unless-stopped
        env_file:
            - .env
        ports:
            - "5060:80"
        depends_on:
            - db
volumes:
    db_data:
